when:
  - event: ["push", "pull_request"]
    branch: ["master"]

engine: "nixery"

dependencies:
  nixpkgs:
    - findutils
    - gnused
    - gcc
    - openssh
    - rsync
    - tailscale
    - netcat
    - gnugrep
  git+https://tangled.org/bentley.sh/coords:
    - android-toolchain

environment:
  PATH: "/tangled/home/.nix-profile/bin:/bin"
  ANDROID_HOME: "/tangled/home/.nix-profile/libexec/android-sdk"
  ANDROID_NDK_HOME: "/tangled/home/.nix-profile/libexec/android-sdk/ndk/26.3.11579264"
  JAVA_HOME: "/tangled/home/.nix-profile"
  BUILD_ALL_ABIS: "true"

steps:
  - name: Check for relevant changes
    command: |
      # Skip build if no Android-related files changed
      CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "unknown")
      if [ "$CHANGED" = "unknown" ]; then
        echo "Could not determine changes, proceeding with build"
      elif echo "$CHANGED" | grep -qE '^(android/|core/|\.tangled/workflows/android\.yaml|flake\.(nix|lock))'; then
        echo "Relevant changes detected:"
        echo "$CHANGED" | grep -E '^(android/|core/|\.tangled/workflows/android\.yaml|flake\.(nix|lock))'
      else
        echo "No Android-related changes, skipping build"
        echo "Changed files: $CHANGED"
        exit 0
      fi

  - name: Connect to tailnet
    command: |
      tailscaled --tun=userspace-networking --socks5-server=localhost:1055 --state=/tmp/tailscale.state &
      sleep 3
      tailscale up --authkey "$TAILSCALE_KEY" --login-server https://ctrl.bentley.sh --hostname "ci-$$" || { echo "tailscale up failed"; exit 1; }
      tailscale status | head -1 || { echo "tailscale status failed"; exit 1; }
      echo "Connected to tailnet"

  - name: Decode keystore
    command: |
      echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
      echo "Keystore decoded to /tmp/release.keystore"

  - name: Create local.properties
    command: |
      echo "MAPTILER_API_KEY=$MAPTILER_API_KEY" > android/local.properties
      echo "local.properties created with MapTiler API key"

  - name: Build signed APK
    command: |
      export VERSION_NAME=$(date +%Y.%-m.%-d)
      export VERSION_CODE=$(date +%Y%m%d)
      cd android
      # Use SDK's AAPT2 (Nix-patched) instead of Gradle's downloaded one
      echo "" >> gradle.properties
      echo "android.aapt2FromMavenOverride=$ANDROID_HOME/build-tools/35.0.0/aapt2" >> gradle.properties
      ./gradlew assembleRelease --no-daemon
    environment:
      KEYSTORE_PATH: /tmp/release.keystore

  - name: Upload APKs to staging
    command: |
      # Create minimal passwd entry for container
      echo "root:x:0:0:root:/root:/bin/sh" >> /etc/passwd
      mkdir -p /root/.ssh

      echo "$DEPLOY_SSH_KEY" > /root/.ssh/deploy_key
      chmod 600 /root/.ssh/deploy_key

      # Upload APKs to staging with today's date
      TODAY=$(date +%Y-%m-%d)
      rsync -avz -e "ssh -o StrictHostKeyChecking=accept-new -o ProxyCommand='nc -x 127.0.0.1:1055 %h %p' -i /root/.ssh/deploy_key" \
        android/app/build/outputs/apk/release/*.apk \
        deploy@coord:/var/lib/coords/staging/$TODAY/